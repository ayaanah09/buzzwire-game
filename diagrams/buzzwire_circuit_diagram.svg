<svg viewBox="0 0 1600 1040" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <!-- ============================================================ -->
  <!--  ARDUINO BUZZWIRE GAME - CIRCUIT SCHEMATIC                    -->
  <!--  Every component, resistor, wire and rail is an editable     -->
  <!--  element. Edit freely in Tinkercad or any SVG editor.        -->
  <!--  Pin assignments taken directly from the Arduino sketch.     -->
  <!-- ============================================================ -->

  <defs>
    <style>
      .wire        { stroke-width: 2.5; fill: none; }
      .w-5v        { stroke: #d11; }
      .w-gnd       { stroke: #111; }
      .w-signal    { stroke: #1565c0; }
      .w-buzz      { stroke: #8e24aa; }
      .pin-label   { font-size: 13px; fill: #111; font-weight: bold; }
      .comp-label  { font-size: 14px; fill: #111; font-weight: bold; }
      .small       { font-size: 11px; fill: #444; }
      .node        { fill: #111; }
      .res-body    { fill: #e8d5a8; stroke: #6b5418; stroke-width: 1.5; }
      .title-big   { font-size: 26px; fill: #111; font-weight: bold; }
      .title-sub   { font-size: 13px; fill: #555; }
      .legend-box  { fill: #fff; stroke: #999; stroke-width: 1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111"/>
    </marker>
    <marker id="arrowgold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b8860b"/>
    </marker>
  </defs>

  <!-- ===================== TITLE ===================== -->
  <text x="40" y="46" class="title-big">Arduino Buzzwire Game — Circuit Schematic</text>
  <text x="40" y="68" class="title-sub">Arduino Uno · 2x photoresistor gates · wand contact · buzzer · red + green LEDs · potentiometer</text>
  <line x1="40" y1="82" x2="1560" y2="82" stroke="#111" stroke-width="2"/>

  <!-- ===================== ARDUINO UNO ===================== -->
  <rect x="120" y="220" width="240" height="560" rx="10" fill="#2f6db0" stroke="#1c4775" stroke-width="2"/>
  <text x="240" y="256" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">ARDUINO</text>
  <text x="240" y="279" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold">UNO</text>
  <rect x="150" y="300" width="180" height="160" rx="4" fill="#1c4775"/>
  <text x="240" y="385" text-anchor="middle" font-size="12" fill="#9fc3ec">microcontroller</text>

  <!-- Right-side digital pins -->
  <rect x="360" y="330" width="22" height="12" fill="#111"/>
  <text x="392" y="340" class="pin-label">D8</text>
  <text x="392" y="354" class="small">Green LED</text>

  <rect x="360" y="370" width="22" height="12" fill="#111"/>
  <text x="392" y="380" class="pin-label">D7</text>
  <text x="392" y="394" class="small">Red LED</text>

  <rect x="360" y="410" width="22" height="12" fill="#111"/>
  <text x="392" y="420" class="pin-label">D6</text>
  <text x="392" y="434" class="small">Buzzer (+)</text>

  <rect x="360" y="450" width="22" height="12" fill="#111"/>
  <text x="392" y="460" class="pin-label">D5</text>
  <text x="392" y="474" class="small">Wand contact (INPUT_PULLUP)</text>

  <rect x="360" y="490" width="22" height="12" fill="#111"/>
  <text x="392" y="500" class="pin-label">D4</text>
  <text x="392" y="514" class="small">Enable switch (INPUT_PULLUP)</text>

  <!-- Left-side analog + power pins -->
  <rect x="98" y="330" width="22" height="12" fill="#111"/>
  <text x="92" y="340" text-anchor="end" class="pin-label">A0</text>
  <text x="92" y="354" text-anchor="end" class="small">Start LDR</text>

  <rect x="98" y="390" width="22" height="12" fill="#111"/>
  <text x="92" y="400" text-anchor="end" class="pin-label">A1</text>
  <text x="92" y="414" text-anchor="end" class="small">End LDR</text>

  <rect x="98" y="450" width="22" height="12" fill="#111"/>
  <text x="92" y="460" text-anchor="end" class="pin-label">A2</text>
  <text x="92" y="474" text-anchor="end" class="small">Pot wiper</text>

  <rect x="98" y="640" width="22" height="12" fill="#d11"/>
  <text x="92" y="650" text-anchor="end" class="pin-label" fill="#d11">5V</text>

  <rect x="98" y="700" width="22" height="12" fill="#111"/>
  <text x="92" y="710" text-anchor="end" class="pin-label">GND</text>

  <!-- ===================== POWER + GND RAILS ===================== -->
  <line x1="470" y1="160" x2="1500" y2="160" class="wire w-5v"/>
  <text x="1505" y="165" class="comp-label" fill="#d11">+5V</text>
  <line x1="470" y1="900" x2="1500" y2="900" class="wire w-gnd"/>
  <text x="1505" y="905" class="comp-label">GND</text>

  <!-- 5V & GND from Arduino to rails -->
  <path d="M98,646 L60,646 L60,160 L470,160" class="wire w-5v"/>
  <path d="M98,706 L48,706 L48,900 L470,900" class="wire w-gnd"/>
  <circle cx="470" cy="160" r="4" class="node" fill="#d11"/>
  <circle cx="470" cy="900" r="4" class="node"/>

  <!-- ============================================================ -->
  <!--  BRANCH 1: START PHOTORESISTOR (A0)                           -->
  <!-- ============================================================ -->
  <g>
    <text x="540" y="232" class="comp-label">Start photoresistor (LDR1)</text>
    <circle cx="580" cy="272" r="22" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="568" y1="284" x2="592" y2="260" stroke="#111" stroke-width="2"/>
    <line x1="565" y1="262" x2="573" y2="254" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="575" y1="272" x2="583" y2="264" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="580" y1="250" x2="580" y2="160" class="wire w-5v"/>
    <circle cx="580" cy="160" r="4" class="node" fill="#d11"/>
    <line x1="580" y1="294" x2="580" y2="360" class="wire w-signal"/>
    <circle cx="580" cy="360" r="4" class="node"/>
    <!-- tap to A0 -->
    <path d="M580,360 L430,360 L430,336 L120,336" class="wire w-signal"/>
    <!-- pull-down resistor to GND -->
    <line x1="580" y1="360" x2="580" y2="410" class="wire w-signal"/>
    <rect x="566" y="410" width="28" height="60" rx="4" class="res-body"/>
    <text x="600" y="445" class="small">10k</text>
    <line x1="580" y1="470" x2="580" y2="900" class="wire w-gnd"/>
    <circle cx="580" cy="900" r="4" class="node"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 2: END PHOTORESISTOR (A1)                            -->
  <!-- ============================================================ -->
  <g>
    <text x="760" y="232" class="comp-label">End photoresistor (LDR2)</text>
    <circle cx="800" cy="272" r="22" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="788" y1="284" x2="812" y2="260" stroke="#111" stroke-width="2"/>
    <line x1="785" y1="262" x2="793" y2="254" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="795" y1="272" x2="803" y2="264" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="800" y1="250" x2="800" y2="160" class="wire w-5v"/>
    <circle cx="800" cy="160" r="4" class="node" fill="#d11"/>
    <line x1="800" y1="294" x2="800" y2="380" class="wire w-signal"/>
    <circle cx="800" cy="380" r="4" class="node"/>
    <!-- tap to A1 -->
    <path d="M800,380 L410,380 L410,396 L120,396" class="wire w-signal"/>
    <line x1="800" y1="380" x2="800" y2="430" class="wire w-signal"/>
    <rect x="786" y="430" width="28" height="60" rx="4" class="res-body"/>
    <text x="820" y="465" class="small">10k</text>
    <line x1="800" y1="490" x2="800" y2="900" class="wire w-gnd"/>
    <circle cx="800" cy="900" r="4" class="node"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 3: POTENTIOMETER (A2)                                -->
  <!-- ============================================================ -->
  <g>
    <text x="980" y="232" class="comp-label">Potentiometer (10k)</text>
    <text x="980" y="248" class="small">sets time limit 10-30 s</text>
    <rect x="990" y="262" width="90" height="40" rx="6" fill="#2a6fc4" stroke="#163a66" stroke-width="2"/>
    <line x1="1035" y1="262" x2="1035" y2="237" stroke="#111" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="990" y1="282" x2="960" y2="282" class="wire w-5v"/>
    <line x1="960" y1="282" x2="960" y2="160" class="wire w-5v"/>
    <circle cx="960" cy="160" r="4" class="node" fill="#d11"/>
    <line x1="1080" y1="282" x2="1110" y2="282" class="wire w-gnd"/>
    <line x1="1110" y1="282" x2="1110" y2="900" class="wire w-gnd"/>
    <circle cx="1110" cy="900" r="4" class="node"/>
    <!-- wiper to A2 -->
    <path d="M1035,237 L1035,205 L390,205 L390,456 L120,456" class="wire w-signal"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 4: WAND CONTACT (D5, INPUT_PULLUP)                   -->
  <!-- ============================================================ -->
  <g>
    <text x="1180" y="330" class="comp-label">Wand &amp; wire maze</text>
    <text x="1180" y="346" class="small">contact closes to GND, D5 reads LOW</text>
    <line x1="1180" y1="395" x2="1310" y2="395" stroke="#111" stroke-width="3"/>
    <text x="1180" y="387" class="small">maze wire</text>
    <line x1="1270" y1="445" x2="1255" y2="400" stroke="#b8860b" stroke-width="3" marker-end="url(#arrowgold)"/>
    <text x="1278" y="445" class="small">wand</text>
    <!-- D5 to maze wire -->
    <path d="M382,456 L1150,456 L1150,395 L1180,395" class="wire w-signal"/>
    <!-- wand returns to GND -->
    <path d="M1270,445 L1270,520 L1400,520 L1400,900" class="wire w-gnd"/>
    <circle cx="1400" cy="900" r="4" class="node"/>
    <text x="1180" y="490" class="small">internal pull-up holds D5 HIGH until contact</text>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 5: RED LED (D7)                                      -->
  <!-- ============================================================ -->
  <g>
    <text x="540" y="600" class="comp-label">Red LED (hit / lose)</text>
    <path d="M382,376 L480,376 L480,630 L580,630" class="wire w-signal"/>
    <rect x="580" y="617" width="60" height="26" rx="4" class="res-body"/>
    <text x="610" y="660" text-anchor="middle" class="small">220</text>
    <path d="M650,630 L675,618 L675,642 Z" fill="#e53935" stroke="#111" stroke-width="1.5"/>
    <line x1="675" y1="616" x2="675" y2="644" stroke="#111" stroke-width="2.5"/>
    <line x1="640" y1="630" x2="650" y2="630" stroke="#111" stroke-width="2.5"/>
    <line x1="675" y1="630" x2="730" y2="630" stroke="#111" stroke-width="2.5"/>
    <path d="M730,630 L730,900" class="wire w-gnd"/>
    <circle cx="730" cy="900" r="4" class="node"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 6: GREEN LED (D8)                                    -->
  <!-- ============================================================ -->
  <g>
    <text x="540" y="720" class="comp-label">Green LED (win)</text>
    <path d="M382,336 L460,336 L460,750 L580,750" class="wire w-signal"/>
    <rect x="580" y="737" width="60" height="26" rx="4" class="res-body"/>
    <text x="610" y="780" text-anchor="middle" class="small">220</text>
    <path d="M650,750 L675,738 L675,762 Z" fill="#43a047" stroke="#111" stroke-width="1.5"/>
    <line x1="675" y1="736" x2="675" y2="764" stroke="#111" stroke-width="2.5"/>
    <line x1="640" y1="750" x2="650" y2="750" stroke="#111" stroke-width="2.5"/>
    <line x1="675" y1="750" x2="850" y2="750" stroke="#111" stroke-width="2.5"/>
    <path d="M850,750 L850,900" class="wire w-gnd"/>
    <circle cx="850" cy="900" r="4" class="node"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 7: BUZZER (D6)                                       -->
  <!-- ============================================================ -->
  <g>
    <text x="1180" y="630" class="comp-label">Piezo buzzer</text>
    <circle cx="1230" cy="690" r="32" fill="#222" stroke="#000" stroke-width="2"/>
    <circle cx="1230" cy="690" r="6" fill="#666"/>
    <text x="1230" y="694" text-anchor="middle" font-size="10" fill="#fff">+</text>
    <path d="M382,416 L440,416 L440,560 L1230,560 L1230,658" class="wire w-buzz"/>
    <text x="900" y="555" class="small">D6 to buzzer (+)</text>
    <path d="M1230,722 L1230,900" class="wire w-gnd"/>
    <circle cx="1230" cy="900" r="4" class="node"/>
  </g>

  <!-- ============================================================ -->
  <!--  BRANCH 8: ENABLE SWITCH (D4)                                -->
  <!-- ============================================================ -->
  <g>
    <text x="1180" y="800" class="comp-label">Enable switch</text>
    <text x="1180" y="816" class="small">LOW = game system ON</text>
    <circle cx="1230" cy="850" r="4" fill="#111"/>
    <circle cx="1290" cy="850" r="4" fill="#111"/>
    <line x1="1230" y1="850" x2="1282" y2="836" stroke="#111" stroke-width="2.5"/>
    <path d="M382,496 L420,496 L420,850 L1226,850" class="wire w-signal"/>
    <path d="M1294,850 L1460,850 L1460,900" class="wire w-gnd"/>
    <circle cx="1460" cy="900" r="4" class="node"/>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <rect x="120" y="810" width="620" height="180" rx="8" class="legend-box"/>
  <text x="140" y="838" class="comp-label">Legend</text>

  <line x1="140" y1="860" x2="180" y2="860" class="wire w-5v"/>
  <text x="190" y="865" class="small">+5V power</text>
  <line x1="140" y1="886" x2="180" y2="886" class="wire w-gnd"/>
  <text x="190" y="891" class="small">Ground (GND)</text>
  <line x1="140" y1="912" x2="180" y2="912" class="wire w-signal"/>
  <text x="190" y="917" class="small">Digital / analog signal</text>
  <line x1="140" y1="938" x2="180" y2="938" class="wire w-buzz"/>
  <text x="190" y="943" class="small">Buzzer drive line</text>
  <rect x="146" y="956" width="28" height="14" rx="3" class="res-body"/>
  <text x="190" y="968" class="small">Resistor (value labeled)</text>

  <text x="400" y="865" class="small">10k — LDR pull-downs &amp; the pot</text>
  <text x="400" y="891" class="small">220 — LED current limiters</text>
  <text x="400" y="917" class="small">Photoresistors form voltage dividers</text>
  <text x="400" y="933" class="small">read on A0 / A1.</text>
  <text x="400" y="959" class="small">Wand &amp; switch use the Uno's internal</text>
  <text x="400" y="975" class="small">pull-ups, so they need no resistor.</text>
</svg>
